<svg width="780" height="560" viewBox="0 0 780 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated Applied AI Impact Lab</title>
  <desc id="desc">Animated SVG panel with model metrics, data flow, and production AI system cards.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="780" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#10283A"/>
      <stop offset="1" stop-color="#151419"/>
    </linearGradient>
    <linearGradient id="edge" x1="40" y1="45" x2="720" y2="515" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D1FF"/>
      <stop offset="0.48" stop-color="#72F6A2"/>
      <stop offset="1" stop-color="#FFB86B"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="756" height="536" rx="32" fill="url(#card)" stroke="url(#edge)" stroke-width="2"/>
  <rect x="38" y="40" width="704" height="480" rx="24" fill="#06101A" fill-opacity="0.58" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g opacity="0.18">
    <path d="M70 110H710M70 180H710M70 250H710M70 320H710M70 390H710M70 460H710" stroke="#EAF7FF"/>
    <path d="M140 72V492M250 72V492M360 72V492M470 72V492M580 72V492M690 72V492" stroke="#EAF7FF"/>
  </g>

  <text x="72" y="95" fill="#B7FFDF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">AI PRODUCTION CONSOLE</text>
  <text x="72" y="128" fill="#8FB7C5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">LLM agents, CV pipelines, data quality, APIs, monitoring</text>

  <g transform="translate(72 170)">
    <rect width="180" height="92" rx="18" fill="#0B1D2A" stroke="#00D1FF" stroke-opacity="0.55"/>
    <text x="22" y="36" fill="#F6FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">50k+</text>
    <text x="22" y="64" fill="#9BB8C4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">fraud accounts</text>
    <animateTransform attributeName="transform" type="translate" values="72 170;72 158;72 170" dur="5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(300 170)">
    <rect width="180" height="92" rx="18" fill="#0B1D2A" stroke="#72F6A2" stroke-opacity="0.55"/>
    <text x="22" y="36" fill="#F6FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">95%</text>
    <text x="22" y="64" fill="#9BB8C4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">CV accuracy</text>
    <animateTransform attributeName="transform" type="translate" values="300 170;300 182;300 170" dur="5.4s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(528 170)">
    <rect width="180" height="92" rx="18" fill="#0B1D2A" stroke="#FFB86B" stroke-opacity="0.55"/>
    <text x="22" y="36" fill="#F6FBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">7M+</text>
    <text x="22" y="64" fill="#9BB8C4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">rows monitored</text>
    <animateTransform attributeName="transform" type="translate" values="528 170;528 160;528 170" dur="5.8s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(88 330)" filter="url(#softGlow)">
    <path d="M0 62C72 -5 135 9 196 57C258 105 319 118 392 48C458 -15 548 4 620 67" stroke="url(#edge)" stroke-width="5" stroke-linecap="round" stroke-dasharray="22 14">
      <animate attributeName="stroke-dashoffset" values="0;-144" dur="4s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="62" r="8" fill="#00D1FF"/>
    <circle cx="196" cy="57" r="8" fill="#72F6A2"/>
    <circle cx="392" cy="48" r="8" fill="#FFB86B"/>
    <circle cx="620" cy="67" r="8" fill="#00D1FF"/>
  </g>

  <g transform="translate(72 410)">
    <rect width="636" height="58" rx="16" fill="#0B1D2A" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <rect x="20" y="21" width="120" height="16" rx="8" fill="#20384A"/>
    <rect x="20" y="21" width="100" height="16" rx="8" fill="#72F6A2">
      <animate attributeName="width" values="42;100;72;118;100" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="168" y="36" fill="#CFE7F1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">deploy -> monitor -> learn -> improve</text>
  </g>
</svg>
